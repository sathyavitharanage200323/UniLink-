spring.application.name=backend

# ── Database ────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/unilink?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&allowZeroDatetime=true&sessionVariables=sql_mode='STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION'
spring.datasource.username=root
spring.datasource.password=Nirupama
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────
# 'update' creates/alters tables automatically from entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── File Upload (for chat attachments) ─────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ── WebSocket ───────────────────────────────────────────────────
spring.websocket.path=/ws

# ── Server ──────────────────────────────────────────────────────
server.port=9090


